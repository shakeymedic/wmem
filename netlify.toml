[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Route newsletter signups to the serverless function ──────
[[redirects]]
  from = "/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# ── Simple anchor redirects ───────────────────────────────────
[[redirects]]
  from = "/home"
  to = "/#home"
  status = 301

[[redirects]]
  from = "/about"
  to = "/#about"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/#contact"
  status = 301

# ── Old domain redirects (NO force=true — this was causing the 404) ──
[[redirects]]
  from = "/*"
  to = "https://emevidence.org/:splat"
  status = 301
  conditions = {Host = ["wmebem.co.uk", "www.wmebem.co.uk"]}

[[redirects]]
  from = "/*"
  to = "https://emevidence.org/:splat"
  status = 301
  conditions = {Host = ["wmebem.com", "www.wmebem.com"]}
