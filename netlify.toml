[build]
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Route /subscribe to the edge function ────────────────────
[[edge_functions]]
  path = "/subscribe"
  function = "subscribe"

# ── Simple anchor redirects ───────────────────────────────────
[[redirects]]
  from = "/home"
  to = "/#home"
  status = 301

[[redirects]]
  from = "/about"
  to = "/#about"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/#contact"
  status = 301

# ── Old domain redirects ──────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "https://emevidence.org/:splat"
  status = 301
  conditions = {Host = ["wmebem.co.uk", "www.wmebem.co.uk"]}

[[redirects]]
  from = "/*"
  to = "https://emevidence.org/:splat"
  status = 301
  conditions = {Host = ["wmebem.com", "www.wmebem.com"]}
